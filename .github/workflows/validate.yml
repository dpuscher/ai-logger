name: Validate

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types:
      - opened
      - edited
      - synchronize
    branches:
      - main
      - dev

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Semantic Pull Request
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # List of valid types
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
          # If the PR title contains a scope, it must be lowercase
          subjectPattern: ^(?![A-Z]).+$

  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn format

      - name: Build
        run: yarn build

      - name: Smoke Test
        run: node dist/main.js --version
