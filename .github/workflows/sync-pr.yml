name: Sync Dev to Main PR

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  pull-request:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable Corepack (for yarn)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Create or Update PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          # Fetch main to compare
          git fetch origin main
          
          # Get list of commits between main and dev
          # We include merges to be comprehensive, but exclude automated release commits
          COMMITS=$(git log origin/main..dev --oneline --pretty=format:"- %s (%h)" | grep -v "chore(release):")
          
          # Try to get the next version from semantic-release (simplified dry-run)
          # We use --dry-run and only the commit-analyzer plugin
          # This uses your existing .releaserc.json branch config but skips all token/permission checks
          npx semantic-release --dry-run --plugins @semantic-release/commit-analyzer > sr_output.txt 2>&1 || true
          cat sr_output.txt
          RAW_VER=$(sed -n 's/.*The next release version is \([0-9.a-zA-Z-]*\).*/\1/p' sr_output.txt | head -n 1)
          
          if [ -z "$RAW_VER" ] || [ "$RAW_VER" = "null" ]; then RAW_VER="Calculating..."; fi
          
          # Strip prerelease suffix for "Target Production Version"
          # e.g., 1.0.0-rc.1 -> 1.0.0
          TARGET_VER=$(echo "$RAW_VER" | sed -E 's/-.*//')
          
          # Construct the PR Body
          PR_BODY=$(cat <<EOF
          ## 🚀 Release Candidate: dev -> main
          
          This PR is automatically kept in sync with the \`dev\` branch. 
          Merge this to trigger a production release to npm.
          
          ### 📦 Version Info
          - **Target Production Version:** \`$TARGET_VER\`
          - **Current Prerelease:** \`$RAW_VER\`
          
          ### 📝 Changes in this release
          $COMMITS
          
          ---
          *Generated by GitHub Actions*
          EOF
          )
          
          # Check if PR already exists
          PR_EXISTS=$(gh pr list --head dev --base main --json number --jq '.[0].number')
          
          if [ -z "$PR_EXISTS" ]; then
            echo "Creating new PR from dev to main..."
            gh pr create \
              --head dev \
              --base main \
              --title "🚀 Release Candidate: dev -> main" \
              --body "$PR_BODY" \
              --draft
          else
            echo "Updating PR #$PR_EXISTS description..."
            gh pr edit "$PR_EXISTS" --body "$PR_BODY"
          fi
